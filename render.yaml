services:
  - type: web
    name: frotatech-platform-api
    runtime: python
    rootDir: platform/backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        fromDatabase:
          name: frotatech-platform-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: ALLOWED_ORIGINS
        value: https://lumicity.frotatech.dev.br,https://staging-lumicity.frotatech.dev.br
      - key: API_V1_PREFIX
        value: /api/v1

databases:
  - name: frotatech-platform-db
    databaseName: frotatech
    user: frotatech
    plan: starter
