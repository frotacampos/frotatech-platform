services:
  backend:
    build:
      context: ./backend
    container_name: frotatech-platform-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://frotatech:frotatech@postgres:5432/frotatech
      REDIS_URL: redis://redis:6379/0
      API_V1_PREFIX: /api/v1
      SECRET_KEY: change-me-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgis/postgis:16-3.4
    container_name: frotatech-platform-postgres
    environment:
      POSTGRES_DB: frotatech
      POSTGRES_USER: frotatech
      POSTGRES_PASSWORD: frotatech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: frotatech-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
